apiVersion: v1
kind: Service
metadata:
  name: load-balancer
  labels:
    purpose: load-balancer-demo
spec:
 type: LoadBalancer
 selector:
   project: roboshop
   dev: env
 ports:
  - protocol: TCP
    port: 80
    targetPort: 80
---
apiVersion: v1
kind: Pod
metadata:
 name: LoadBalancer-demo
 labels:
  project: roboshop
  dev: env
spec:
 containers:
  - name: nginx
    image: nginx
