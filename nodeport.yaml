apiVersion: v1
kind: Service
metadata:
  name: nodeport
  labels: 
    purpose: demo-nodeport
spec:
  type: nodeport
  selector:
    project: roboshop
    dev: env
  ports:
   - protocol: TCP
     port: 80
     targetPort: 80
---
apiVersion: v1
kind: pod
metadata:
 name: nodeport-pod
 labels:
   project: roboshop
   dev: env
spec:
 containers:
  - name: nginx
    image: nginx