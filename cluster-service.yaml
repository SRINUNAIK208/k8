apiVersion: v1
kind: Service
metadata:
  name: cluster-service
spec:
 selector:
   project: roboshop
   env: dev
 ports:
  - protocol: TCP
    port: 80
    targetPort: 8080

apiVersion: v1
kind: Pod
metadata:
  name: nginx-pod
  labels:
    project: roboshop
    env: dev
spec:
 containers:
  - name: nginx
    image: nginx
    

  

  